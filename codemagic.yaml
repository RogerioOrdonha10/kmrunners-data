workflows:
  ios-release:
    name: RunBR iOS Release
    max_build_duration: 60
    environment:
      groups:
        - default
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "br.com.runbr.app"
        TEAM_ID: "XM2QZZX7QL"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: br.com.runbr.app
    scripts:
      - name: Patch FlutterFlow dependencies
        script: |
          #!/bin/bash
          set -e

          python3 -c "
          content = open('pubspec.yaml').read()
          content = content.replace('font_awesome_flutter: 10.7.0', 'font_awesome_flutter: 11.0.0')
          content = content.replace('page_transition: 2.1.0', 'page_transition: 2.2.2')
          open('pubspec.yaml', 'w').write(content)
          print('pubspec.yaml patched')
          "

          python3 -c "
          content = open('lib/flutter_flow/flutter_flow_widgets.dart').read()
          content = content.replace('FaIcon(\n            widget.iconData!,', 'Icon(\n            widget.iconData!,')
          open('lib/flutter_flow/flutter_flow_widgets.dart', 'w').write(content)
          print('Done patching flutter_flow_widgets')
          "

          python3 -c "
          content = open('lib/flutter_flow/flutter_flow_icon_button.dart').read()
          content = content.replace('FaIcon(', 'Icon(')
          open('lib/flutter_flow/flutter_flow_icon_button.dart', 'w').write(content)
          print('Done patching flutter_flow_icon_button')
          "

          rm -f pubspec.lock
          flutter pub get

          find ~/.pub-cache -path "*/page_transition-2.2.2/lib/src/page_transition.dart" | while read f; do
            sed -i '' "s/import 'package:flutter\/material.dart';/import 'package:flutter\/material.dart';\nimport 'package:flutter\/cupertino.dart';/g" "$f"
            echo "Patched $f"
          done

      - name: Set up code signing
        script: |
          #!/bin/bash
          set -e

          python3 -c "
          content = open('ios/Runner.xcodeproj/project.pbxproj').read()
          old = 'PRODUCT_BUNDLE_IDENTIFIER = br.com.runbr;'
          new = 'PRODUCT_BUNDLE_IDENTIFIER = br.com.runbr.app;'
          content = content.replace(old, new)
          open('ios/Runner.xcodeproj/project.pbxproj', 'w').write(content)
          print('Bundle ID fixed')
          "

          PROFILE_UUID="c00a97cf-8011-461c-8e12-d10833f5dac0"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /Users/builder/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision \
             ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision 2>/dev/null || true

          CERT_FILE=$(ls /Users/builder/Library/MobileDevice/Certificates/code_signing_certificate_*.p12 2>/dev/null | head -1)
          KEYCHAIN=$(ls ~/Library/codemagic-cli-tools/keychains/*.keychain-db 2>/dev/null | head -1)

          if [ -n "$KEYCHAIN" ] && [ -n "$CERT_FILE" ]; then
            echo "Importing cert: $CERT_FILE into $KEYCHAIN"
            security import "$CERT_FILE" \
              -k "$KEYCHAIN" \
              -P "$CM_CERTIFICATE_PASSWORD" \
              -T /usr/bin/codesign \
              -T /usr/bin/security \
              -f pkcs12 || true
            security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -s -k "" "$KEYCHAIN" || true
          fi

          xcode-project use-profiles

          cat > /Users/builder/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>XM2QZZX7QL</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>br.com.runbr.app</key>
              <string>c00a97cf-8011-461c-8e12-d10833f5dac0</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Patch encryption compliance
        script: |
          #!/bin/bash
          set -e
          python3 -c "
          import plistlib
          path = 'ios/Runner/Info.plist'
          with open(path, 'rb') as f:
              plist = plistlib.load(f)
          plist['ITSAppUsesNonExemptEncryption'] = False
          with open(path, 'wb') as f:
              plistlib.dump(plist, f)
          print('ITSAppUsesNonExemptEncryption = False set')
          "

      - name: Install CocoaPods
        script: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update
          cd ..

      - name: Build iOS IPA
        script: |
          #!/bin/bash
          set -e
          echo "BUILD_NUMBER = ${BUILD_NUMBER}"

          python3 -c "
          import re, sys
          build_num = sys.argv[1]
          content = open('pubspec.yaml').read()
          match = re.search(r'version: (.+)[+]\d+', content)
          content = content.replace(match.group(0), 'version: ' + match.group(1) + '+' + build_num)
          open('pubspec.yaml', 'w').write(content)
          print('pubspec patched: ' + build_num)
          " "${BUILD_NUMBER}"

          flutter build ipa \
            --release \
            --build-number=${BUILD_NUMBER} \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: DU6BAS73HP
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
