name: Atualizar Noticias KM Runners
on:
  schedule:
    # 09:00 e 18:00 horário de Brasília (UTC-3) = 12:00 e 21:00 UTC
    - cron: "0 12 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch: {} # permite rodar manualmente pelo botão "Run workflow"
jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Instalar dependências
        run: pip install requests
      - name: Atualizar notícias no Airtable
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE: Noticias
        run: python scripts/atualizar_noticias.py
