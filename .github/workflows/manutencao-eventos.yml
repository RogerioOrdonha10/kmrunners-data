name: Manutencao Eventos KM Runners
on:
  workflow_dispatch:
  schedule:
    # Toda segunda-feira às 06:00 UTC = 03:00 horário de Brasília
    - cron: "0 6 * * 1"
permissions:
  contents: write
jobs:
  manutencao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install requests
      - name: Atualizar eventos passados no Airtable
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE: tblqjvIf09EMJgzN7
        run: python scripts/manutencao_eventos.py
      - name: Commit cidades.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cidades.json
          git diff --staged --quiet || git commit -m "chore: atualiza cidades.json [skip ci]"
          git push
